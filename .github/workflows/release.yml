name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to (e.g. v0.1.0). Leave empty for a dry-run build with no release upload."
        required: false
        type: string
      windows_trusted_signing_account:
        description: "Azure Trusted Signing account name for Windows artifacts."
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   target: aarch64-apple-darwin,        platform: macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,         platform: macos-x64 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,    platform: linux-x64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,      platform: windows-x64 }

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from package.json `packageManager` field;
      # do not pass `version:` here or pnpm/action-setup@v4 errors with
      # ERR_PNPM_BAD_PM_VERSION on the duplicate spec.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (macOS — signed + notarized)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "${{ secrets.APPSTORE_CONNECT_KEY_BASE64 }}" | base64 --decode > /tmp/asc-key.p8
          export APPLE_API_KEY_PATH=/tmp/asc-key.p8
          pnpm tauri build --target ${{ matrix.target }}

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }} --bundles deb,appimage,updater

      - name: Build (Windows — unsigned)
        if: matrix.os == 'windows-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Sign Windows binaries (Azure Trusted Signing)
        if: matrix.os == 'windows-latest'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT || 'https://eus.codesigning.azure.net/' }}
          trusted-signing-account-name: ${{ github.event.inputs.windows_trusted_signing_account || vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME || 'mono-labs' }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: src-tauri/target/${{ matrix.target }}/release/bundle
          files-folder-filter: exe,msi
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          # macOS runners default to bash 3.2 which doesn't support
          # `shopt -s globstar`, so we use `find` for portability.
          # User-facing installers + the updater bundles + their .sig files.
          # The .sig files are produced when TAURI_SIGNING_PRIVATE_KEY is set;
          # the latest-json job downstream reads them to build the manifest.
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$bundle_dir" -type f \
            \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
               -o -name '*.deb' -o -name '*.AppImage' \
               -o -name '*.AppImage.tar.gz' -o -name '*.AppImage.tar.gz.sig' \
               -o -name '*.msi' -o -name '*.msi.zip' -o -name '*.msi.zip.sig' \
               -o -name '*.exe' -o -name '*.nsis.zip' -o -name '*.nsis.zip.sig' \) \
            -exec cp -f {} dist-release/ \;
          ls -la dist-release/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: dist-release/

  release:
    needs: build
    # `always()` lets the release land even when one matrix entry
    # (currently Windows, blocked on Azure Trusted Signing credential
    # config) fails. download-artifact picks up whatever the successful
    # matrix builds uploaded; the upload step has
    # fail_on_unmatched_files=false so a missing platform is non-fatal.
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != '') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la ./artifacts

      # latest.json is the manifest tauri-plugin-updater fetches from
      # the GitHub Releases endpoint configured in tauri.conf.json. It
      # tells the running app which version is current and where to
      # download the signed update bundle from. The pubkey on the
      # device side verifies these signatures against the corresponding
      # private key held in TAURI_SIGNING_PRIVATE_KEY.
      - name: Generate latest.json (updater manifest)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          cd artifacts

          read_sig() {
            # Echo the trimmed contents of $1 if it exists, else empty.
            if [ -f "$1" ]; then
              tr -d '\n\r' < "$1"
            fi
          }

          # Find each platform's updater bundle + sig. Tauri produces:
          #   macOS:   <name>.app.tar.gz + .sig
          #   Linux:   <name>.AppImage.tar.gz + .sig
          #   Windows: <name>.nsis.zip + .sig  (or .msi.zip + .sig)
          DARWIN_ARM_BUNDLE=$(ls *aarch64*.app.tar.gz 2>/dev/null | head -1 || true)
          DARWIN_ARM_SIG="${DARWIN_ARM_BUNDLE}.sig"
          DARWIN_X64_BUNDLE=$(ls *x86_64*.app.tar.gz 2>/dev/null | head -1 || true)
          DARWIN_X64_SIG="${DARWIN_X64_BUNDLE}.sig"
          LINUX_BUNDLE=$(ls *.AppImage.tar.gz 2>/dev/null | head -1 || true)
          LINUX_SIG="${LINUX_BUNDLE}.sig"
          WIN_BUNDLE=$(ls *.nsis.zip 2>/dev/null | head -1 || ls *.msi.zip 2>/dev/null | head -1 || true)
          WIN_SIG="${WIN_BUNDLE}.sig"

          # Build per-platform entries only when a signed bundle exists,
          # so a partial release (e.g. macOS-only) still produces a
          # valid manifest the plugin can parse.
          PLATFORMS_JSON="{}"
          add_platform() {
            local key="$1" bundle="$2" sig="$3"
            if [ -n "$bundle" ] && [ -f "$sig" ]; then
              local sig_data
              sig_data=$(read_sig "$sig")
              PLATFORMS_JSON=$(jq \
                --arg k "$key" \
                --arg s "$sig_data" \
                --arg u "${BASE}/${bundle}" \
                '. + {($k): {signature: $s, url: $u}}' \
                <<<"$PLATFORMS_JSON")
            fi
          }

          add_platform "darwin-aarch64" "$DARWIN_ARM_BUNDLE" "$DARWIN_ARM_SIG"
          add_platform "darwin-x86_64"  "$DARWIN_X64_BUNDLE" "$DARWIN_X64_SIG"
          add_platform "linux-x86_64"   "$LINUX_BUNDLE"      "$LINUX_SIG"
          add_platform "windows-x86_64" "$WIN_BUNDLE"        "$WIN_SIG"

          jq -n \
            --arg v "$VERSION" \
            --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg n "Monolythium desktop wallet ${TAG}" \
            --argjson p "$PLATFORMS_JSON" \
            '{version: $v, pub_date: $d, notes: $n, platforms: $p}' \
            > latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ./artifacts/*
          draft: true
          fail_on_unmatched_files: false

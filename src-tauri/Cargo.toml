[package]
name = "desktop-wallet"
version = "0.0.1"
edition = "2021"
rust-version = "1.77"
description = "Monolythium desktop wallet (Tauri 2)"
license = "MIT"
publish = false

[lib]
name = "desktop_wallet_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "desktop-wallet"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
# Default to no custom features. Production builds opt in via `--features custom-protocol`.
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
